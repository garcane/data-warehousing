<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .dim  { fill:#eaf2fb; stroke:#2f6fb0; stroke-width:1.5; }
    .fact { fill:#fdecea; stroke:#c0392b; stroke-width:2; }
    .title{ font-size:14px; font-weight:700; }
    .ftitle{ font-size:15px; font-weight:700; fill:#c0392b; }
    .col  { font-size:11px; fill:#333; }
    .pk   { font-size:11px; font-weight:700; fill:#1a5276; }
    .fk   { font-size:11px; fill:#7d3c98; }
    .m    { font-size:11px; fill:#1e8449; }
    .rel  { stroke:#888; stroke-width:1.5; }
    .cap  { font-size:12px; font-weight:700; fill:#555; }
  </style>

  <text x="450" y="26" text-anchor="middle" class="cap" font-size="16">Superstore Data Warehouse — Star Schema (Kimball)</text>

  <!-- Fact (centre) -->
  <rect x="345" y="250" width="210" height="150" rx="6" class="fact"/>
  <text x="450" y="270" text-anchor="middle" class="ftitle">FACTOrderItem</text>
  <line x1="345" y1="278" x2="555" y2="278" stroke="#c0392b"/>
  <text x="356" y="294" class="pk">PK Fact_SK</text>
  <text x="356" y="310" class="col">Row_Id, Order_Id (DD)</text>
  <text x="356" y="326" class="fk">FK Customer/Product/ShipMode</text>
  <text x="356" y="342" class="fk">FK Geog/OrderDate_SK</text>
  <text x="356" y="358" class="col">ShipDate</text>
  <text x="356" y="374" class="m">Sales, Qty, Discount, Profit</text>
  <text x="356" y="392" class="col" font-style="italic">grain: one order line item</text>

  <!-- dimDate (top-left) -->
  <rect x="40" y="70" width="200" height="92" rx="6" class="dim"/>
  <text x="140" y="90" text-anchor="middle" class="title">dimDate</text>
  <line x1="40" y1="98" x2="240" y2="98" stroke="#2f6fb0"/>
  <text x="52" y="114" class="pk">PK Date_SK</text>
  <text x="52" y="130" class="col">DateValue, Day, Week</text>
  <text x="52" y="146" class="col">Month, Quarter, Year</text>

  <!-- dimCustomer (top-right) -->
  <rect x="660" y="70" width="200" height="92" rx="6" class="dim"/>
  <text x="760" y="90" text-anchor="middle" class="title">dimCustomer</text>
  <line x1="660" y1="98" x2="860" y2="98" stroke="#2f6fb0"/>
  <text x="672" y="114" class="pk">PK Customer_SK</text>
  <text x="672" y="130" class="col">CustomerId (NK), Name</text>
  <text x="672" y="146" class="col">CustomerSegment</text>

  <!-- dimProduct (right) -->
  <rect x="660" y="300" width="200" height="92" rx="6" class="dim"/>
  <text x="760" y="320" text-anchor="middle" class="title">dimProduct</text>
  <line x1="660" y1="328" x2="860" y2="328" stroke="#2f6fb0"/>
  <text x="672" y="344" class="pk">PK Product_SK</text>
  <text x="672" y="360" class="col">ProductId+Name (NK)</text>
  <text x="672" y="376" class="col">Category, SubCategory</text>

  <!-- dimGeog (bottom-left) -->
  <rect x="40" y="470" width="200" height="92" rx="6" class="dim"/>
  <text x="140" y="490" text-anchor="middle" class="title">dimGeog</text>
  <line x1="40" y1="498" x2="240" y2="498" stroke="#2f6fb0"/>
  <text x="52" y="514" class="pk">PK Geog_SK</text>
  <text x="52" y="530" class="col">Country, Region, State</text>
  <text x="52" y="546" class="col">City + PostalCode (NK)</text>

  <!-- dimShipMode (bottom-right) -->
  <rect x="660" y="470" width="200" height="76" rx="6" class="dim"/>
  <text x="760" y="490" text-anchor="middle" class="title">dimShipMode</text>
  <line x1="660" y1="498" x2="860" y2="498" stroke="#2f6fb0"/>
  <text x="672" y="514" class="pk">PK ShipMode_SK</text>
  <text x="672" y="530" class="col">ShipMode (NK)</text>

  <!-- relationships -->
  <line x1="240" y1="130" x2="345" y2="278" class="rel"/>
  <line x1="660" y1="130" x2="555" y2="278" class="rel"/>
  <line x1="660" y1="346" x2="555" y2="330" class="rel"/>
  <line x1="240" y1="500" x2="345" y2="360" class="rel"/>
  <line x1="660" y1="500" x2="555" y2="365" class="rel"/>

  <!-- legend -->
  <text x="345" y="425" class="pk">PK surrogate key</text>
  <text x="345" y="441" class="fk">FK foreign key</text>
  <text x="470" y="425" class="m">M measure (additive*)</text>
  <text x="470" y="441" class="col">NK natural key · DD degenerate dim</text>
</svg>
